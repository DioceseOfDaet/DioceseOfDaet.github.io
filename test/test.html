<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Coat of Arms</title>
    <style>
        :root {
            --accent: #D4AF37;
            --text-color: #333;
        }

        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            background: #f4f4f4; 
        }
        
        .container { 
            display: flex; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 1200px;
            gap: 30px;
        }

        .wrapper { 
            position: relative; 
            display: inline-block; 
        }

        #coa-img { 
            display: block; 
            max-width: 100%; 
            height: auto; 
        }
        
        #highlight-canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none; 
        }

        .sidebar { 
            flex: 1; 
            min-width: 300px; 
            border-left: 4px solid var(--accent); 
            padding-left: 20px; 
        }

        #info-title { color: #8B0000; margin-top: 0; }
        #info-content { line-height: 1.6; color: var(--text-color); font-size: 1.1rem; }

        area { cursor: pointer; }
    </style>
</head>

    <div class="sidebar">
        <h2 id="info-title">Heraldry Guide</h2>
        <div id="info-content">
            <p>Click a shield to reveal its components. Move your mouse away to reset.</p>
        </div>
    </div>
</div>

<script>
  const heraldryData = {
        "diocese of daet": { title: 'The Coat of Arms of the Diocese of Daet', content: 'The color <b>Gules (Red)</b> is in memory of the <b>first Bishop of Daet,</b> the Most <b>Reverend Celestino R. Enverga</b>, as his second surname in Spanish means red, <b>"Rojo."</b> <br><br> The <b>Or (Gold)</b> and <b>Argent (White)</b> are the colors of the Papal flag, <b>symbolizing the Diocese\'s loyalty to the Lord Jesus Christ and to the Successor of St. Peter.</b>' },
        "holy trinity": { title: '', content: 'One of the earliest Christian symbols for the <b>Holy Trinity can be seen: three fishes joined together in a single triangular shape.</b> The Holy Trinity is the <b>Titular Patron of the Cathedral</b> of the Diocese of Daet. On the Feast of the Holy Trinity (June 9, 1974), the Papal Nuncio announced to the newspapers the establishment of the new Diocese and the choice of Pope Paul VI for its first bishop.' },
        "cross with keys": { title: '', content: 'The <b>Black Cross with eight points</b> is a symbol dating back to the first century for <b>St. John the Baptist, the Patron of the Parish and the Capitol of Camarines Norte, the town of Daet;</b> this has also been the seat of the Bishop of the Diocese since its establishment in 1974. The <b>Golden Key</b> is the symbol of <b>St. Peter the Apostle</b> (Mt 16:19), who is also the Patron of the <b>Parish in the town of Vinzons, Camarines Norte.</b> The <b>Golden Sword</b> is a unique symbol of the <b>Parish of Our Lady of Candelaria in Paracale, Camarines Norte.</b>' },
        "flower and axe": { title: '', content: 'On the left side, there is a <b>White Lily</b>, a sign of <b>St. Joseph,</b> and of his <b>goodness, holiness, purity, and obedience to God.</b> <br><br> The <b>Pickaxe</b> is a symbol of the <b>gold, iron, and copper mines, and other minerals abundant in the province of Camarines Norte,</b> which the Diocese oversees. This symbol also comes from the first seal of the Diocese. ' },
        "bishop herman arms": { title: 'Personal Coat of Arms of the Most Reverend Herman Guinto Abcede, R.C.J., D.D.', content: 'The color <b>Azure (Blue)</b> is based on the deep devotion of Bishop Herman to the Blessed Virgin Mary, and <b>Vert (Green)</b> is the color for <b>Ecclesiastical inquiry in the field of Canon Law,</b> a field of study that is important to Bishop Herman.' },
        "burning heart": { title: '', content: 'The Radiant <b>Sacred Heart with Wheat</b> is a symbol of the <b>Burning Heart of Jesus,</b> which is full of mercy for people who approach Him like sheep without a shepherd. This is why Jesus told His disciples to <b>pray to the Lord of the Harvest to send workers into His harvest.</b> These are also symbols borrowed from the logo of the <b>Congregation of the Rogationists of the Heart of Jesus,</b> founded by St. Hannibal Mary Di Francia, of which the Bishop is also a member.' },
        "keys": { title: '', content: '<,>St. Peter the Apostle, the patron of the town where Bishop Herman originated (Vinzons, Camarines Norte),</b> is depicted holding <b>two keys</b> symbolizing the keys to the Kingdom of Heaven. These symbols declare St. Peter\'s duty as the guardian of the gates of Heaven, according to the Bible, especially in Matthew 16:19, where Jesus gave Peter the "keys of the kingdom of heaven." The two keys also signify his power to bind and to loose, showing his very important duty in the Church.' },
        "border": { title: '', content: 'The <b>twelve crosses with smaller crosses on their arms (or Cross Crosslets)</b> are also symbols of the <b>Catholic Church founded on the faith of the Twelve Apostles,</b> and can be seen in the Small Christian Communities journeying together in the spirit of the <b>Synodal</b> process.' },
        "motto": { title: '', content: '<b>"ROGATE ERGO DOMINUM MESSIS",</b> taken from the Good News according to <b>St. Matthew (9:38): "Pray therefore the Lord of the harvest</b> to send out laborers into his harvest."' },
        "processional cross": {title: 'Processional Cross', content: 'Also called the Heraldic Cross, is the <b>cross</b> placed directly behind the shield. the cross <b>"supports"</b> the shield from behind, acting as the primary symbol of the <b>cleric\'s participation in the authority of Christ.</b> A <b>bishops processional cross</b> only has <b>one bar (Latin Cross)</b> symbolizing it\'s <b>rank as a bishop</b>'},
        "galero": {title: 'Galero', content: 'A bishop\'s <b>galero</b> is green; The <b>green</b> color specifically symbolizes the <b>office of a shepherd and the hope for the spiritual growth of the diocese,</b> the color originated in Spain where formerly a green hat was actually worn by bishops. <br><br> A bishop\'s galero has <b>6 tassles on each side</b> in a pyramind structure (arranged 1, 2, 3), for a <b>total of 12</b>. The number of <b>tassles hanging from each side of the galero</b> symbolizes the <b>rank and authority in the Catholic Church.</b>'}
    };

    const img = document.getElementById('coa-img');
    const canvas = document.getElementById('highlight-canvas');
    const ctx = canvas.getContext('2d');
    const mainMap = document.getElementById('main-map');
    const infoTitle = document.getElementById('info-title');
    const infoContent = document.getElementById('info-content');

    const childData = {
        diocese: [
            { alt: "Holy Trinity", coords: "379,387,380,684,639,684,637,387" },
            { alt: "Cross with Keys", coords: "382,683,380,936,385,949,391,960,403,971,422,980,509,980,509,683" },
            { alt: "Flower and Axe", coords: "512,683,511,980,599,983,617,991,634,1007,641,1028,639,685" }
        ],
        herman: [
            { alt: "Burning Heart", coords: "642,442,642,682,845,683,843,443" },
            { alt: "Keys", coords: "642,684,639,940,651,934,663,927,679,925,824,926,834,922,841,917,846,909,845,684" },
            { alt: "Border", coords: "643,388,643,442,846,442,845,905,841,913,835,922,823,925,677,925,661,928,648,936,642,941,639,1029,651,1003,660,990,671,987,684,984,853,983,871,975,885,967,893,956,901,938,901,385" }
        ]
    };

    function resizeMap() {
        if (!img.naturalWidth) return;
        const scale = img.clientWidth / img.naturalWidth;
        canvas.width = img.clientWidth;
        canvas.height = img.clientHeight;
        
        document.querySelectorAll('area:not(.child)').forEach(area => {
            if(!area.dataset.original) area.dataset.original = area.coords;
            area.coords = area.dataset.original.split(',').map(c => Math.round(c * scale)).join(',');
        });
    }

    function resetAll() {
        document.querySelectorAll('.child').forEach(c => c.remove());
        updateSidebar("Heraldry Guide", "Click a shield to reveal its components. Move your mouse away to reset.");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function injectChildren(groupName) {
        document.querySelectorAll('.child').forEach(c => c.remove());
        const scale = img.clientWidth / img.naturalWidth;
        
        childData[groupName].forEach(data => {
            const area = document.createElement('area');
            area.className = 'child';
            area.shape = 'poly';
            area.alt = data.alt;
            area.coords = data.coords.split(',').map(c => Math.round(c * scale)).join(',');

            area.addEventListener('mouseenter', drawHighlight);
            // If mouse leaves child, clear highlight but DON'T reset (it might go back to parent)
            area.addEventListener('mouseleave', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
            area.addEventListener('click', (e) => {
                e.stopPropagation();
                updateSidebar(data.alt, `Historical explanation of the ${data.alt} symbol.`);
            });

            mainMap.prepend(area); 
        });
    }

    function drawHighlight(e) {
        const area = e.target;
        const coords = area.coords.split(',').map(Number);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = area.classList.contains('parent') ? "rgba(139, 0, 0, 0.3)" : "rgba(212, 175, 55, 0.4)";
        ctx.strokeStyle = "#D4AF37";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < coords.length; i += 2) {
            i === 0 ? ctx.moveTo(coords[i], coords[i+1]) : ctx.lineTo(coords[i], coords[i+1]);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function updateSidebar(altText) {
        const data = heraldryData[altText.toLowerCase()];
        if (data) {
            infoTitle.innerText = data.title;
            infoContent.innerHTML = `<p>${data.content}</p>`;
        }
    }

    // Global Click Reset
    document.addEventListener('click', resetAll);

    function setupAreas() {
        document.querySelectorAll('.parent, .static').forEach(area => {
            area.addEventListener('click', (e) => {
                e.stopPropagation();
                if (area.classList.contains('parent')) {
                    injectChildren(area.dataset.group);
                    updateSidebar(area.alt, "Symbols unlocked. Hover over them to see details.");
                } else {
                    resetAll();
                    updateSidebar(area.alt, `The ${area.alt} represents...`);
                }
            });

            area.addEventListener('mouseenter', drawHighlight);

            area.addEventListener('mouseleave', (e) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Logic: If we move from parent to a child, don't reset.
                // We use a small timeout to see where the mouse "landed"
                setTimeout(() => {
                    const hovered = document.querySelectorAll('area:hover');
                    if (hovered.length === 0) {
                        resetAll();
                    }
                }, 10);
            });
        });
    }

    window.addEventListener('load', () => {
        resizeMap();
        setupAreas();
    });
    window.addEventListener('resize', resizeMap);
</script>
