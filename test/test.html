<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camarines Norte Map</title>

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    
    <script src="https://cdn.maptiler.com/maptiler-leaflet-sdk/v2.0.0/leaflet-maptiler-sdk.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

  <script>
    // Use maptilersdk to initialize the map directly to avoid the 'L.maptilerLayer' error
    const map = new maptilersdk.Map({
      container: 'map',
      style: "019db912-cee9-723a-93e6-b89360815c9e", // Your Style ID
      apiKey: "qqOC54zoRb8iFyHyyMOi",
      center: [122.62696, 14.11761], // MapTiler uses [Lng, Lat]
      zoom: 9.1
    });

    // Once the map is loaded, we handle the Leaflet-style GeoJSON
    map.on('load', function() {
      fetch('/test/camarines_norte.json')
      .then(response => {
        if (!response.ok) throw new Error("File not found");
        return response.json();
      })
      .then(data => {
        // Add GeoJSON using the MapTiler/MapLibre syntax (more performant)
        map.addSource('province', {
          'type': 'geojson',
          'data': data
        });

        map.addLayer({
          'id': 'province-fill',
          'type': 'fill',
          'source': 'province',
          'layout': {},
          'paint': {
              'fill-color': '#ff7800',
              'fill-opacity': 0.2
          }
        });

        map.addLayer({
          'id': 'province-outline',
          'type': 'line',
          'source': 'province',
          'layout': {},
          'paint': {
              'line-color': '#ff7800',
              'line-width': 3
          }
        });
      })
      .catch(err => console.error("Error loading GeoJSON:", err));
    });
  </script>
</body>
</html>
